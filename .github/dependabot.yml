version: 2
updates:
  # One entry per ecosystem+directory — Dependabot rejects duplicates, so the
  # @yume-chan fast lane is a group here, not a second npm entry.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      yume-chan:
        patterns:
          - "@yume-chan/*"
      npm-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@yume-chan/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
