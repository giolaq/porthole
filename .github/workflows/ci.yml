name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage
      - run: npm run lint
      - run: npm run typecheck
      - name: npm pack smoke
        shell: bash
        run: |
          npm pack -w portholejs
          mkdir -p /tmp/porthole-pack-smoke
          cp portholejs-*.tgz /tmp/porthole-pack-smoke/
          cd /tmp/porthole-pack-smoke
          npm init -y
          npm install ./portholejs-*.tgz
          npx porthole --version
          npx porthole list -q || true

  android-integration:
    name: Android integration
    runs-on: ubuntu-latest
    # Emulator boots are slow and quota-hungry: run on main pushes and manual
    # dispatch, not on every PR iteration.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Playwright browsers are not part of npm ci; the e2e suite needs a
      # branded Chrome for H.264 WebCodecs support.
      - run: npx playwright install --with-deps chrome
      - uses: ./
        id: porthole
        with:
          avd-name: porthole-ci
          api-level: 35
          profile: phone
          porthole-command: node packages/porthole/dist/cli.js
          script: |
            PORTHOLE_EMU=1 npm run test
            PORTHOLE_E2E=1 npm run test:e2e
