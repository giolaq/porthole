name: scrcpy pin freshness

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: pin
        run: node .github/scripts/check-scrcpy-pin.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # PRs opened with GITHUB_TOKEN do not trigger CI, so verify the bumped
      # pin right here: the download script re-fetches and checks the sha.
      - name: Verify bumped pin downloads and matches
        if: steps.pin.outputs.changed == 'true'
        run: |
          rm -f packages/porthole/assets/scrcpy-server
          node packages/porthole/scripts/download-scrcpy-server.mjs
          test -f packages/porthole/assets/scrcpy-server
      - name: Open scrcpy pin PR
        if: steps.pin.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/bump-scrcpy-${{ steps.pin.outputs.version }}
          title: "chore: bump scrcpy server to ${{ steps.pin.outputs.version }}"
          commit-message: "chore: bump scrcpy server to ${{ steps.pin.outputs.version }}"
          body: |
            Updates the pinned scrcpy-server download to `${{ steps.pin.outputs.version }}` and SHA-256 `${{ steps.pin.outputs.sha256 }}`.

            Reminder: verify the `AdbScrcpyOptions` class still matches the scrcpy server protocol before merging.
