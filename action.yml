name: Porthole Android Emulator
description: Boot an Android emulator, start Porthole, and run a smoke script.
branding:
  icon: smartphone
  color: blue
inputs:
  avd-name:
    description: Name to give the CI AVD.
    required: false
    default: porthole-ci
  api-level:
    description: Android API level for the emulator image.
    required: false
    default: "35"
  profile:
    description: phone, tv, or an Android hardware profile id.
    required: false
    default: phone
  hardware-profile:
    description: Optional Android hardware profile id override.
    required: false
    default: ""
  port:
    description: Porthole HTTP port.
    required: false
    default: "3200"
  porthole-command:
    description: Command used to run Porthole.
    required: false
    default: npx --yes portholejs
  script:
    description: Commands to run while the emulator and Porthole session are alive.
    required: false
    default: |
      "$PORTHOLE_CLI" screenshot -q -p "$PORTHOLE_PORT"
outputs:
  url:
    description: Porthole browser/control URL.
    value: ${{ steps.porthole.outputs.url }}
  serial:
    description: Android emulator serial.
    value: ${{ steps.porthole.outputs.serial }}
  port:
    description: Porthole HTTP port.
    value: ${{ steps.porthole.outputs.port }}
runs:
  using: composite
  steps:
    - name: Resolve emulator profile
      id: profile
      shell: bash
      env:
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_HARDWARE_PROFILE: ${{ inputs.hardware-profile }}
      run: |
        set -euo pipefail
        case "$INPUT_PROFILE" in
          tv)
            target="android-tv"
            hardware_profile="${INPUT_HARDWARE_PROFILE:-tv_1080p}"
            ;;
          phone)
            target="google_apis"
            hardware_profile="${INPUT_HARDWARE_PROFILE:-pixel_7_pro}"
            ;;
          *)
            target="google_apis"
            hardware_profile="${INPUT_HARDWARE_PROFILE:-$INPUT_PROFILE}"
            ;;
        esac
        {
          echo "target=$target"
          echo "hardware-profile=$hardware_profile"
        } >> "$GITHUB_OUTPUT"

    - name: Enable Linux KVM
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Run emulator and Porthole
      id: porthole
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ inputs.api-level }}
        target: ${{ steps.profile.outputs.target }}
        arch: x86_64
        profile: ${{ steps.profile.outputs.hardware-profile }}
        avd-name: ${{ inputs.avd-name }}
        emulator-port: 5554
        # The emulator runner executes each script line in a separate shell —
        # multi-line state (variables, heredocs) does not survive. Everything
        # lives in porthole-action.sh, invoked as one line.
        script: bash "$PORTHOLE_ACTION_SCRIPT"
      env:
        PORTHOLE_ACTION_SCRIPT: ${{ github.action_path }}/.github/scripts/porthole-action.sh
        PORTHOLE_COMMAND: ${{ inputs.porthole-command }}
        PORTHOLE_PORT: ${{ inputs.port }}
        PORTHOLE_USER_SCRIPT: ${{ inputs.script }}
